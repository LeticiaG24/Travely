<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/viagem.css">
    <title>Travely</title>
</head>
<body>
    <section class="info">
        <div>
            <h1>Nome</h1>
            <p>12/06/2026→20/06/2026</p>
            <div class="destino"><i class="fa-solid fa-location-dot"></i><p>França, Itália, Suíça</p></div>
        </div>
        <button><i class="fa-solid fa-pen-to-square"></i> Editar</button>
    </section>
    <section class="plano">
        <div id="itinerario">
            <div class="nome-plano">
                <i class="fa-solid fa-calendar"></i>
                <h2>Itinerário</h2>
            </div>
            <div class="dias">
                <div>
                    <h3>12 de fevereiro, ter</h3>
                    <div class="item-itinerario">
                        <p>Nome</p>
                        <p>Hora</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="reservas">
            <div class="nome-plano">
                <i class="fa-regular fa-file-lines"></i>
                <h2>Reservas</h2>
            </div>
            <div class="reservas-feitas">
                <div>
                    <p>Nome</p>
                    <p>Horário</p>
                </div>
            </div>
        </div>
        <div id="orcamento">
            <div class="nome-plano">
                <i class="fa-solid fa-coins"></i>
                <h2>Orçamento</h2> 
            </div>
            <div>
                <p>Total</p>
                <div class="despesas">
                    <div>
                        <p>Nome</p>
                        <p>Valor</p>
                        <p>Tipo</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <button><i class="fa-solid fa-plus"></i></button>
    <div class="criar">
        <button><i class="fa-solid fa-calendar"></i>Itinerário</button>
        <button><i class="fa-regular fa-file-lines"></i>Reserva</button>
        <button><i class="fa-solid fa-coins"></i>Despesa</button>
    </div>
</body>
</html>
